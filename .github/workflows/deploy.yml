name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npm run build

      # Attempt Vercel deploy (non-blocking: won't fail the whole run)
      - name: Deploy to Vercel (best-effort)
        if: env.HAS_VERCEL == 'true'
        continue-on-error: true
        env:
          HAS_VERCEL: ${{ secrets.VERCEL_TOKEN != '' && 'true' || 'false' }}
        run: |
          npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --yes --cwd docs/.vitepress/dist 2>&1 | tee /tmp/vercel.log

      # GitHub Pages fallback — reliable, no external deps
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vitepress/dist
          force_orphan: true
